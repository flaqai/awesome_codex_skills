name: Bug Report
description: Report a broken link, incorrect info, or other issue
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Report an Issue

        Help us keep the list accurate. Report broken links, outdated info, or other problems.

  - type: input
    id: skill_name
    attributes:
      label: Skill Name
      description: Which skill has the issue?
      placeholder: "e.g., Find Skills"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      options:
        - Broken link (404 or unreachable)
        - Incorrect information
        - Outdated content
        - Duplicate entry
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue
      placeholder: "The link returns 404..."
    validations:
      required: true
