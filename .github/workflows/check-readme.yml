name: Check README

on:
  push:
    branches: [main]
    paths:
      - 'data/skills.json'
      - 'scripts/generate-readmes.mjs'
      - 'scripts/languages.mjs'
      - 'scripts/readme-section-anchors.mjs'
      - 'README*.md'
  pull_request:
    branches: [main]
    paths:
      - 'data/skills.json'
      - 'scripts/generate-readmes.mjs'
      - 'scripts/languages.mjs'
      - 'scripts/readme-section-anchors.mjs'
      - 'README*.md'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check README is up to date
        run: npm run check:readme
